name: Mobile Release

on:
  push:
    branches:
      - main
    paths:
      - Makefile
      - .github/workflows/mobile-release.yml
      - .github/workflows/android-play-release.yml
      - .github/workflows/ios-testflight.yml
      - apps/android/**
      - apps/ios/**
      - shared/rust-bridge/**
      - shared/third_party/codex
      - patches/codex/**
      - tools/scripts/build-android-rust.sh

permissions:
  contents: write

concurrency:
  group: mobile-release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  detect-release-changes:
    if: github.event_name != 'push' || !contains(github.event.head_commit.message, '[skip mobile-release]')
    runs-on: ubuntu-latest
    outputs:
      release_android: ${{ steps.filter.outputs.release_android }}
      release_ios: ${{ steps.filter.outputs.release_ios }}
      run_release: ${{ steps.resolve.outputs.run_release }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect release changes
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            release_android:
              - 'Makefile'
              - '.github/workflows/mobile-release.yml'
              - '.github/workflows/android-play-release.yml'
              - 'apps/android/**'
              - 'apps/ios/scripts/sync-codex.sh'
              - 'shared/rust-bridge/**'
              - 'shared/third_party/codex'
              - 'patches/codex/**'
              - 'tools/scripts/build-android-rust.sh'
            release_ios:
              - 'Makefile'
              - '.github/workflows/mobile-release.yml'
              - '.github/workflows/ios-testflight.yml'
              - 'apps/ios/**'
              - 'shared/rust-bridge/**'
              - 'shared/third_party/codex'
              - 'patches/codex/**'

      - name: Resolve release matrix
        id: resolve
        env:
          RELEASE_ANDROID: ${{ steps.filter.outputs.release_android }}
          RELEASE_IOS: ${{ steps.filter.outputs.release_ios }}
        run: |
          set -euo pipefail
          if [[ "$RELEASE_ANDROID" == "true" || "$RELEASE_IOS" == "true" ]]; then
            echo "run_release=true" >> "$GITHUB_OUTPUT"
          else
            echo "run_release=false" >> "$GITHUB_OUTPUT"
          fi

  shared-prep:
    needs: detect-release-changes
    if: needs.detect-release-changes.outputs.run_release == 'true'
    runs-on: macos-26
    timeout-minutes: 60
    env:
      HOMEBREW_NO_AUTO_UPDATE: "1"
      SCCACHE_BUCKET: rust-cache
      SCCACHE_ENDPOINT: ${{ secrets.SCCACHE_R2_ENDPOINT }}
      SCCACHE_REGION: auto
      SCCACHE_S3_USE_SSL: "true"
      SCCACHE_S3_KEY_PREFIX: ci/mobile-release
      SCCACHE_LOG: info
      AWS_ACCESS_KEY_ID: ${{ secrets.SCCACHE_R2_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.SCCACHE_R2_SECRET_ACCESS_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '26.3'

      - name: Install build dependencies
        run: brew install meson ninja xcodegen

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Sync codex submodule
        run: ./apps/ios/scripts/sync-codex.sh --preserve-current

      - name: Restore generated mobile bindings cache
        id: mobile-bindings-cache
        uses: actions/cache@v4
        with:
          path: |
            shared/rust-bridge/generated
          key: mobile-bindings-${{ runner.os }}-${{ hashFiles('apps/ios/scripts/sync-codex.sh', 'shared/rust-bridge/generate-bindings.sh', 'shared/rust-bridge/Cargo.toml', 'shared/rust-bridge/Cargo.lock', 'shared/rust-bridge/codex-mobile-client/src/**', 'shared/rust-bridge/uniffi-bindgen/**', 'patches/codex/**', 'shared/third_party/codex/codex-rs/app-server-protocol/src/protocol/**', 'shared/third_party/codex/codex-rs/protocol/src/**') }}

      - name: Generate shared mobile bindings
        if: steps.mobile-bindings-cache.outputs.cache-hit != 'true'
        env:
          RUSTC_WRAPPER: sccache
          CARGO_INCREMENTAL: "0"
        run: |
          cd shared/rust-bridge
          ./generate-bindings.sh

      - name: Package shared mobile sources
        run: |
          mkdir -p apps/ios/GeneratedRust/Headers .ci-prep/shared

          cp shared/rust-bridge/generated/swift/codex_mobile_client.swift \
            apps/ios/Sources/Litter/Bridge/UniFFICodexClient.generated.swift
          cp shared/rust-bridge/generated/swift/codex_mobile_clientFFI.h \
            apps/ios/GeneratedRust/Headers/codex_mobile_clientFFI.h
          cp shared/rust-bridge/generated/swift/codex_mobile_clientFFI.modulemap \
            apps/ios/GeneratedRust/Headers/codex_mobile_clientFFI.modulemap
          cp shared/rust-bridge/generated/swift/module.modulemap \
            apps/ios/GeneratedRust/Headers/module.modulemap

          {
            printf '%s\n' \
              shared/rust-bridge/codex-mobile-client/src/lib.rs \
              shared/rust-bridge/codex-mobile-client/src/conversation_uniffi.rs \
              shared/rust-bridge/codex-mobile-client/src/discovery_uniffi.rs \
              shared/rust-bridge/codex-mobile-client/Cargo.toml \
              shared/rust-bridge/../third_party/codex/codex-rs/app-server-protocol/src/protocol/common.rs \
              shared/rust-bridge/../third_party/codex/codex-rs/app-server-protocol/src/protocol/v1.rs \
              shared/rust-bridge/../third_party/codex/codex-rs/app-server-protocol/src/protocol/v2.rs \
              shared/rust-bridge/../third_party/codex/codex-rs/protocol/src/account.rs \
              shared/rust-bridge/../third_party/codex/codex-rs/protocol/src/config_types.rs \
              shared/rust-bridge/../third_party/codex/codex-rs/protocol/src/models.rs \
              shared/rust-bridge/../third_party/codex/codex-rs/protocol/src/openai_models.rs \
              shared/rust-bridge/../third_party/codex/codex-rs/protocol/src/parse_command.rs \
              shared/rust-bridge/../third_party/codex/codex-rs/protocol/src/protocol.rs
            find shared/rust-bridge/codex-mobile-client/src/ffi -type f -name '*.rs' | sort
          } | sort | while IFS= read -r file; do
            [ -f "$file" ] || continue
            shasum -a 256 "$file"
          done | shasum -a 256 | awk '{print $1}' > apps/ios/GeneratedRust/.swift-bindings.hash

          tar -czf .ci-prep/shared/generated-mobile-sources.tgz -C . \
            shared/rust-bridge/generated \
            apps/ios/Sources/Litter/Bridge/UniFFICodexClient.generated.swift \
            apps/ios/GeneratedRust/Headers \
            apps/ios/GeneratedRust/.swift-bindings.hash

      - name: Upload shared prep artifact
        uses: actions/upload-artifact@v4
        with:
          name: shared-prep
          path: .ci-prep/shared
          if-no-files-found: error

  play-release:
    needs: [detect-release-changes, shared-prep]
    if: needs.detect-release-changes.outputs.release_android == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 90
    environment: release
    env:
      SCCACHE_BUCKET: rust-cache
      SCCACHE_ENDPOINT: ${{ secrets.SCCACHE_R2_ENDPOINT }}
      SCCACHE_REGION: auto
      SCCACHE_S3_USE_SSL: "true"
      SCCACHE_S3_KEY_PREFIX: ci/mobile-release
      SCCACHE_LOG: info
      AWS_ACCESS_KEY_ID: ${{ secrets.SCCACHE_R2_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.SCCACHE_R2_SECRET_ACCESS_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Validate required secrets
        env:
          ANDROID_UPLOAD_KEYSTORE_B64: ${{ secrets.ANDROID_UPLOAD_KEYSTORE_B64 }}
          LITTER_UPLOAD_STORE_PASSWORD: ${{ secrets.LITTER_UPLOAD_STORE_PASSWORD }}
          LITTER_UPLOAD_KEY_ALIAS: ${{ secrets.LITTER_UPLOAD_KEY_ALIAS }}
          LITTER_UPLOAD_KEY_PASSWORD: ${{ secrets.LITTER_UPLOAD_KEY_PASSWORD }}
          LITTER_PLAY_SERVICE_ACCOUNT_JSON_B64: ${{ secrets.LITTER_PLAY_SERVICE_ACCOUNT_JSON_B64 }}
        run: |
          set -euo pipefail
          required=(
            ANDROID_UPLOAD_KEYSTORE_B64
            LITTER_UPLOAD_STORE_PASSWORD
            LITTER_UPLOAD_KEY_ALIAS
            LITTER_UPLOAD_KEY_PASSWORD
            LITTER_PLAY_SERVICE_ACCOUNT_JSON_B64
          )
          for name in "${required[@]}"; do
            if [[ -z "${!name:-}" ]]; then
              echo "Missing required secret: $name" >&2
              exit 1
            fi
          done

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android platforms and NDK
        run: |
          yes | sdkmanager --licenses
          sdkmanager "platform-tools" "platforms;android-35" "build-tools;35.0.0" "ndk;30.0.14904198"

      - name: Install system deps
        run: sudo apt-get update && sudo apt-get install -y pkg-config libssl-dev libcap-dev clang cmake

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,x86_64-linux-android

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Prime sccache
        run: |
          export SCCACHE_ERROR_LOG="$RUNNER_TEMP/sccache-android.log"
          rm -f "$SCCACHE_ERROR_LOG"
          sccache --stop-server || true
          sccache --start-server
          sccache --show-stats || true

      - name: Download shared prep artifact
        uses: actions/download-artifact@v4
        with:
          name: shared-prep
          path: .ci-prep/shared

      - name: Restore shared prep
        run: |
          ./apps/ios/scripts/sync-codex.sh --preserve-current

          SHARED_PREP_ROOT=.ci-prep/shared
          if [ -d "$SHARED_PREP_ROOT/shared" ]; then
            SHARED_PREP_ROOT="$SHARED_PREP_ROOT/shared"
          fi

          tar -xzf "$SHARED_PREP_ROOT/generated-mobile-sources.tgz" -C .
          mkdir -p .build-stamps
          touch .build-stamps/sync .build-stamps/bindings-kotlin

      - name: Install cargo-ndk
        env:
          RUSTC_WRAPPER: sccache
        run: cargo install cargo-ndk --locked

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Decode release credentials
        env:
          ANDROID_UPLOAD_KEYSTORE_B64: ${{ secrets.ANDROID_UPLOAD_KEYSTORE_B64 }}
          LITTER_PLAY_SERVICE_ACCOUNT_JSON_B64: ${{ secrets.LITTER_PLAY_SERVICE_ACCOUNT_JSON_B64 }}
        run: |
          set -euo pipefail
          store_file="$RUNNER_TEMP/litter-upload.jks"
          service_account_json="$RUNNER_TEMP/play-service-account.json"
          echo "$ANDROID_UPLOAD_KEYSTORE_B64" | base64 --decode > "$store_file"
          echo "$LITTER_PLAY_SERVICE_ACCOUNT_JSON_B64" | base64 --decode > "$service_account_json"
          echo "LITTER_UPLOAD_STORE_FILE=$store_file" >> "$GITHUB_ENV"
          echo "LITTER_PLAY_SERVICE_ACCOUNT_JSON=$service_account_json" >> "$GITHUB_ENV"
          ls -lh "$store_file" "$service_account_json"

      - name: Resolve Android release inputs
        env:
          GITHUB_RUN_NUMBER: ${{ github.run_number }}
        run: |
          set -euo pipefail
          VERSION_CODE="$((200000000 + GITHUB_RUN_NUMBER))"
          echo "LITTER_VERSION_CODE_OVERRIDE=$VERSION_CODE" >> "$GITHUB_ENV"

      - name: Apply Android versionCode
        env:
          LITTER_VERSION_CODE_OVERRIDE: ${{ env.LITTER_VERSION_CODE_OVERRIDE }}
        run: ./apps/android/scripts/bump-version.sh

      - name: Build Rust Android release libs
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/30.0.14904198
          CARGO_INCREMENTAL: "0"
          CARGO_BUILD_JOBS: "1"
          ANDROID_ABIS: arm64-v8a
          ANDROID_RUST_PROFILE: mobile-release
          RUSTC_WRAPPER: sccache
        run: |
          set -euo pipefail
          export SCCACHE_ERROR_LOG="$RUNNER_TEMP/sccache-android.log"
          trap 'status=$?; echo "==> sccache stats"; sccache --show-stats || true; if [ -f "$SCCACHE_ERROR_LOG" ]; then echo "==> sccache error log"; tail -200 "$SCCACHE_ERROR_LOG" || true; fi; exit $status' EXIT
          sccache --zero-stats || true
          make rust-android
          echo "==> sccache stats after Android Rust build"
          sccache --show-stats || true

      - name: Build Android release APK
        env:
          JAVA_HOME: ${{ env.JAVA_HOME }}
          ANDROID_SDK_ROOT: ${{ env.ANDROID_HOME }}
          ANDROID_NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/30.0.14904198
          GRADLE_MAX_WORKERS: "1"
          GRADLE_OPTS: -Dorg.gradle.jvmargs=-Xmx1536m -Dfile.encoding=UTF-8
          LITTER_UPLOAD_STORE_FILE: ${{ env.LITTER_UPLOAD_STORE_FILE }}
          LITTER_UPLOAD_STORE_PASSWORD: ${{ secrets.LITTER_UPLOAD_STORE_PASSWORD }}
          LITTER_UPLOAD_KEY_ALIAS: ${{ secrets.LITTER_UPLOAD_KEY_ALIAS }}
          LITTER_UPLOAD_KEY_PASSWORD: ${{ secrets.LITTER_UPLOAD_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          heartbeat() {
            while sleep 60; do
              echo "==> heartbeat $(date -u +%FT%TZ)"
              free -h || true
              df -h . || true
            done
          }
          heartbeat &
          HEARTBEAT_PID=$!
          trap 'status=$?; kill "$HEARTBEAT_PID" >/dev/null 2>&1 || true; wait "$HEARTBEAT_PID" 2>/dev/null || true; exit $status' EXIT
          ./apps/android/gradlew -p apps/android --no-daemon --stacktrace "--max-workers=$GRADLE_MAX_WORKERS" \
            :app:assembleRelease \
            -PLITTER_UPLOAD_STORE_FILE="$LITTER_UPLOAD_STORE_FILE" \
            -PLITTER_UPLOAD_STORE_PASSWORD="$LITTER_UPLOAD_STORE_PASSWORD" \
            -PLITTER_UPLOAD_KEY_ALIAS="$LITTER_UPLOAD_KEY_ALIAS" \
            -PLITTER_UPLOAD_KEY_PASSWORD="$LITTER_UPLOAD_KEY_PASSWORD"

      - name: Publish Android bundle to Google Play
        env:
          JAVA_HOME: ${{ env.JAVA_HOME }}
          ANDROID_SDK_ROOT: ${{ env.ANDROID_HOME }}
          ANDROID_NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/30.0.14904198
          GRADLE_MAX_WORKERS: "1"
          GRADLE_OPTS: -Dorg.gradle.jvmargs=-Xmx1536m -Dfile.encoding=UTF-8
          LITTER_VERSION_CODE_OVERRIDE: ${{ env.LITTER_VERSION_CODE_OVERRIDE }}
          LITTER_UPLOAD_STORE_FILE: ${{ env.LITTER_UPLOAD_STORE_FILE }}
          LITTER_UPLOAD_STORE_PASSWORD: ${{ secrets.LITTER_UPLOAD_STORE_PASSWORD }}
          LITTER_UPLOAD_KEY_ALIAS: ${{ secrets.LITTER_UPLOAD_KEY_ALIAS }}
          LITTER_UPLOAD_KEY_PASSWORD: ${{ secrets.LITTER_UPLOAD_KEY_PASSWORD }}
          LITTER_PLAY_SERVICE_ACCOUNT_JSON: ${{ env.LITTER_PLAY_SERVICE_ACCOUNT_JSON }}
          LITTER_PLAY_TRACK: internal
        run: |
          set -euo pipefail
          heartbeat() {
            while sleep 60; do
              echo "==> heartbeat $(date -u +%FT%TZ)"
              free -h || true
              df -h . || true
            done
          }
          heartbeat &
          HEARTBEAT_PID=$!
          trap 'status=$?; kill "$HEARTBEAT_PID" >/dev/null 2>&1 || true; wait "$HEARTBEAT_PID" 2>/dev/null || true; exit $status' EXIT
          ./apps/android/scripts/play-upload.sh
          sccache --show-stats || true

      - name: Generate checksums
        run: |
          set -euo pipefail
          APK_PATH="apps/android/app/build/outputs/apk/release/app-release.apk"
          AAB_PATH="apps/android/app/build/outputs/bundle/release/app-release.aab"
          sha256sum "$APK_PATH" > "${APK_PATH}.sha256"
          sha256sum "$AAB_PATH" > "${AAB_PATH}.sha256"

      - name: Upload Android release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-play-release-${{ github.run_number }}
          if-no-files-found: error
          path: |
            apps/android/app/build/outputs/apk/release/app-release.apk
            apps/android/app/build/outputs/apk/release/app-release.apk.sha256
            apps/android/app/build/outputs/bundle/release/app-release.aab
            apps/android/app/build/outputs/bundle/release/app-release.aab.sha256

  ios-release-prep:
    needs: [detect-release-changes, shared-prep]
    if: needs.detect-release-changes.outputs.release_ios == 'true'
    runs-on: macos-26
    timeout-minutes: 90
    env:
      HOMEBREW_NO_AUTO_UPDATE: "1"
      SCCACHE_BUCKET: rust-cache
      SCCACHE_ENDPOINT: ${{ secrets.SCCACHE_R2_ENDPOINT }}
      SCCACHE_REGION: auto
      SCCACHE_S3_USE_SSL: "true"
      SCCACHE_S3_KEY_PREFIX: ci/mobile-release
      SCCACHE_LOG: info
      AWS_ACCESS_KEY_ID: ${{ secrets.SCCACHE_R2_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.SCCACHE_R2_SECRET_ACCESS_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '26.3'

      - name: Install build dependencies
        run: brew install meson ninja xcodegen

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios,aarch64-apple-ios-sim,x86_64-apple-ios

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Download shared prep artifact
        uses: actions/download-artifact@v4
        with:
          name: shared-prep
          path: .ci-prep/shared

      - name: Restore shared prep
        run: |
          ./apps/ios/scripts/sync-codex.sh --preserve-current

          SHARED_PREP_ROOT=.ci-prep/shared
          if [ -d "$SHARED_PREP_ROOT/shared" ]; then
            SHARED_PREP_ROOT="$SHARED_PREP_ROOT/shared"
          fi

          tar -xzf "$SHARED_PREP_ROOT/generated-mobile-sources.tgz" -C .
          mkdir -p .build-stamps
          touch .build-stamps/sync

      - name: Prepare iOS release assets
        env:
          CARGO_INCREMENTAL: "0"
          CARGO_BUILD_JOBS: "1"
          IOS_RUST_PROFILE: mobile-release
          RUSTC_WRAPPER: sccache
        run: |
          set -euo pipefail
          export SCCACHE_ERROR_LOG="$RUNNER_TEMP/sccache-ios.log"
          trap 'status=$?; echo "==> sccache stats"; sccache --show-stats || true; if [ -f "$SCCACHE_ERROR_LOG" ]; then echo "==> sccache error log"; tail -200 "$SCCACHE_ERROR_LOG" || true; fi; exit $status' EXIT
          sccache --zero-stats || true
          ./apps/ios/scripts/build-rust.sh --preserve-current --device-only --skip-bindings
          make ios-frameworks xcgen
          echo "==> sccache stats after iOS release prep"
          sccache --show-stats || true

      - name: Package iOS release prep artifact
        run: |
          mkdir -p .ci-prep/ios
          tar -czf .ci-prep/ios/ios-release-prep.tgz -C . \
            apps/ios/Frameworks/ios_system \
            apps/ios/GeneratedRust \
            apps/ios/Sources/Litter/Bridge/UniFFICodexClient.generated.swift

      - name: Upload iOS release prep artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-release-prep
          path: .ci-prep/ios
          if-no-files-found: error

  upload-testflight:
    needs: [detect-release-changes, ios-release-prep]
    if: needs.detect-release-changes.outputs.release_ios == 'true'
    runs-on: macos-26
    timeout-minutes: 150
    environment: release
    env:
      HOMEBREW_NO_AUTO_UPDATE: "1"
      SCCACHE_BUCKET: rust-cache
      SCCACHE_ENDPOINT: ${{ secrets.SCCACHE_R2_ENDPOINT }}
      SCCACHE_REGION: auto
      SCCACHE_S3_USE_SSL: "true"
      SCCACHE_S3_KEY_PREFIX: ci/mobile-release
      SCCACHE_LOG: info
      AWS_ACCESS_KEY_ID: ${{ secrets.SCCACHE_R2_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.SCCACHE_R2_SECRET_ACCESS_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '26.3'

      - name: Validate required secrets
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_PRIVATE_KEY_P8_B64: ${{ secrets.ASC_PRIVATE_KEY_P8_B64 }}
          IOS_APP_STORE_APP_ID: ${{ secrets.IOS_APP_STORE_APP_ID }}
          IOS_TEAM_ID: ${{ secrets.IOS_TEAM_ID }}
          IOS_DIST_CERT_P12_B64: ${{ secrets.IOS_DIST_CERT_P12_B64 }}
          IOS_DIST_CERT_PASSWORD: ${{ secrets.IOS_DIST_CERT_PASSWORD }}
          IOS_APP_STORE_PROFILE_B64: ${{ secrets.IOS_APP_STORE_PROFILE_B64 }}
        run: |
          set -euo pipefail
          required=(
            ASC_KEY_ID
            ASC_ISSUER_ID
            ASC_PRIVATE_KEY_P8_B64
            IOS_APP_STORE_APP_ID
            IOS_TEAM_ID
            IOS_DIST_CERT_P12_B64
            IOS_DIST_CERT_PASSWORD
            IOS_APP_STORE_PROFILE_B64
          )
          for name in "${required[@]}"; do
            if [[ -z "${!name:-}" ]]; then
              echo "Missing required secret: $name" >&2
              exit 1
            fi
          done

      - name: Install build dependencies
        run: |
          set -euo pipefail
          brew install xcodegen jq asc
          xcodebuild -version
          asc --version

      - name: Download iOS release prep artifact
        uses: actions/download-artifact@v4
        with:
          name: ios-release-prep
          path: .ci-prep/ios

      - name: Restore iOS release prep
        run: |
          IOS_PREP_ROOT=.ci-prep/ios
          if [ -d "$IOS_PREP_ROOT/ios" ]; then
            IOS_PREP_ROOT="$IOS_PREP_ROOT/ios"
          fi

          tar -xzf "$IOS_PREP_ROOT/ios-release-prep.tgz" -C .

      - name: Decode App Store Connect API key
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_PRIVATE_KEY_P8_B64: ${{ secrets.ASC_PRIVATE_KEY_P8_B64 }}
        run: |
          set -euo pipefail
          ASC_KEY_PATH="$RUNNER_TEMP/AuthKey_${ASC_KEY_ID}.p8"
          echo "$ASC_PRIVATE_KEY_P8_B64" | base64 --decode > "$ASC_KEY_PATH"
          chmod 600 "$ASC_KEY_PATH"
          echo "ASC_PRIVATE_KEY_PATH=$ASC_KEY_PATH" >> "$GITHUB_ENV"

      - name: Install signing certificate and provisioning profile
        env:
          IOS_DIST_CERT_P12_B64: ${{ secrets.IOS_DIST_CERT_P12_B64 }}
          IOS_DIST_CERT_PASSWORD: ${{ secrets.IOS_DIST_CERT_PASSWORD }}
          IOS_APP_STORE_PROFILE_B64: ${{ secrets.IOS_APP_STORE_PROFILE_B64 }}
        run: |
          set -euo pipefail

          CERT_PATH="$RUNNER_TEMP/dist-cert.p12"
          PROFILE_PATH="$RUNNER_TEMP/app-store.mobileprovision"
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -base64 24)"

          echo "$IOS_DIST_CERT_P12_B64" | base64 --decode > "$CERT_PATH"
          echo "$IOS_APP_STORE_PROFILE_B64" | base64 --decode > "$PROFILE_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH"
          security default-keychain -d user -s "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -k "$KEYCHAIN_PATH" -P "$IOS_DIST_CERT_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          PROFILE_UUID="$(security cms -D -i "$PROFILE_PATH" | plutil -extract UUID raw -)"
          PROFILE_NAME="$(security cms -D -i "$PROFILE_PATH" | plutil -extract Name raw -)"
          cp "$PROFILE_PATH" "$HOME/Library/MobileDevice/Provisioning Profiles/$PROFILE_UUID.mobileprovision"

          echo "PROVISIONING_PROFILE_SPECIFIER=$PROFILE_NAME" >> "$GITHUB_ENV"

      - name: Resolve release inputs
        run: |
          set -euo pipefail

          SCHEME="Litter"
          APP_BUNDLE_ID="com.sigkitten.litter"
          BETA_GROUP_NAMES="Internal Testers,External Testers"
          WAIT_FOR_PROCESSING="1"

          echo "SCHEME=$SCHEME" >> "$GITHUB_ENV"
          echo "APP_BUNDLE_ID=$APP_BUNDLE_ID" >> "$GITHUB_ENV"
          echo "BETA_GROUP_NAMES=$BETA_GROUP_NAMES" >> "$GITHUB_ENV"
          echo "WAIT_FOR_PROCESSING=$WAIT_FOR_PROCESSING" >> "$GITHUB_ENV"

      - name: Build TestFlight IPA
        env:
          SCHEME: ${{ env.SCHEME }}
          APP_BUNDLE_ID: ${{ env.APP_BUNDLE_ID }}
          APP_STORE_APP_ID: ${{ secrets.IOS_APP_STORE_APP_ID }}
          TEAM_ID: ${{ secrets.IOS_TEAM_ID }}
          PROVISIONING_PROFILE_SPECIFIER: ${{ env.PROVISIONING_PROFILE_SPECIFIER }}
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_PRIVATE_KEY_PATH: ${{ env.ASC_PRIVATE_KEY_PATH }}
          BETA_GROUP_NAMES: ${{ env.BETA_GROUP_NAMES }}
          WAIT_FOR_PROCESSING: ${{ env.WAIT_FOR_PROCESSING }}
          TESTFLIGHT_SKIP_UPLOAD: "1"
        run: |
          set -euo pipefail
          ./apps/ios/scripts/testflight-upload.sh

      - name: Upload to TestFlight
        env:
          SCHEME: ${{ env.SCHEME }}
          APP_BUNDLE_ID: ${{ env.APP_BUNDLE_ID }}
          APP_STORE_APP_ID: ${{ secrets.IOS_APP_STORE_APP_ID }}
          TEAM_ID: ${{ secrets.IOS_TEAM_ID }}
          PROVISIONING_PROFILE_SPECIFIER: ${{ env.PROVISIONING_PROFILE_SPECIFIER }}
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_PRIVATE_KEY_PATH: ${{ env.ASC_PRIVATE_KEY_PATH }}
          BETA_GROUP_NAMES: ${{ env.BETA_GROUP_NAMES }}
          WAIT_FOR_PROCESSING: ${{ env.WAIT_FOR_PROCESSING }}
          TESTFLIGHT_SKIP_BUILD: "1"
        run: |
          set -euo pipefail
          ./apps/ios/scripts/testflight-upload.sh

      - name: Commit TestFlight version bump
        run: |
          set -euo pipefail
          if git diff --quiet -- apps/ios/project.yml docs/releases/testflight-whats-new.md; then
            echo "No TestFlight version bump to commit."
            exit 0
          fi

          version="$(awk -F'"' '/MARKETING_VERSION:/ {print $2; exit}' apps/ios/project.yml)"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add apps/ios/project.yml docs/releases/testflight-whats-new.md
          git commit -m "ios: start TestFlight ${version} [skip mobile-release]"
          git push origin "HEAD:${GITHUB_REF_NAME}"
