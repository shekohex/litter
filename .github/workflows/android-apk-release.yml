name: Android APK Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  detect-android-changes:
    runs-on: ubuntu-latest
    outputs:
      run_release: ${{ steps.filter.outputs.run_release }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect Android-related changes
        id: filter
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]] || [[ "${{ github.ref }}" == refs/tags/* ]]; then
            echo "run_release=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          changed_files="$(git diff-tree --no-commit-id --name-only -r "$GITHUB_SHA" || true)"
          echo "Changed files:"
          echo "$changed_files"

          run_release=false
          while IFS= read -r file; do
            [[ -z "$file" ]] && continue
            case "$file" in
              apps/android/*|shared/rust-bridge/*|.github/workflows/android-apk-release.yml|.github/workflows/android.yml)
                run_release=true
                break
                ;;
            esac
          done <<< "$changed_files"

          echo "run_release=$run_release" >> "$GITHUB_OUTPUT"

  shared-prep:
    needs: detect-android-changes
    if: needs.detect-android-changes.outputs.run_release == 'true'
    runs-on: macos-26
    timeout-minutes: 60
    env:
      HOMEBREW_NO_AUTO_UPDATE: "1"
      SCCACHE_BUCKET: rust-cache
      SCCACHE_ENDPOINT: ${{ secrets.SCCACHE_R2_ENDPOINT }}
      SCCACHE_REGION: auto
      SCCACHE_S3_USE_SSL: "true"
      SCCACHE_S3_KEY_PREFIX: ci/android-release-prep
      AWS_ACCESS_KEY_ID: ${{ secrets.SCCACHE_R2_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.SCCACHE_R2_SECRET_ACCESS_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '26.3'

      - name: Install build dependencies
        run: brew install meson ninja

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Sync codex submodule
        run: ./apps/ios/scripts/sync-codex.sh --preserve-current

      - name: Restore generated mobile bindings cache
        id: mobile-bindings-cache
        uses: actions/cache@v4
        with:
          path: |
            shared/rust-bridge/generated
            shared/rust-bridge/codex-mobile-client/src/types/codegen_types.generated.rs
            shared/rust-bridge/codex-mobile-client/src/rpc/generated_client.generated.rs
            shared/rust-bridge/codex-mobile-client/src/ffi/rpc.generated.rs
          key: mobile-bindings-${{ runner.os }}-${{ hashFiles('apps/ios/scripts/sync-codex.sh', 'shared/rust-bridge/generate-bindings.sh', 'shared/rust-bridge/Cargo.toml', 'shared/rust-bridge/Cargo.lock', 'shared/rust-bridge/codegen/**', 'shared/rust-bridge/codex-mobile-client/src/**', 'shared/rust-bridge/uniffi-bindgen/**', 'patches/codex/**', 'shared/third_party/codex/codex-rs/app-server-protocol/src/protocol/**', 'shared/third_party/codex/codex-rs/protocol/src/**') }}

      - name: Generate shared mobile bindings
        if: steps.mobile-bindings-cache.outputs.cache-hit != 'true'
        env:
          RUSTC_WRAPPER: sccache
          CARGO_INCREMENTAL: "0"
        run: |
          cd shared/rust-bridge
          ./generate-bindings.sh --kotlin-only

      - name: Package shared prep artifact
        run: |
          mkdir -p .ci-prep/shared
          tar -czf .ci-prep/shared/generated-mobile-sources.tgz -C . \
            shared/rust-bridge/generated \
            shared/rust-bridge/codex-mobile-client/src/types/codegen_types.generated.rs \
            shared/rust-bridge/codex-mobile-client/src/rpc/generated_client.generated.rs \
            shared/rust-bridge/codex-mobile-client/src/ffi/rpc.generated.rs

      - name: Upload shared prep artifact
        uses: actions/upload-artifact@v4
        with:
          name: shared-prep
          path: .ci-prep/shared
          if-no-files-found: error

  release-apk:
    needs: [detect-android-changes, shared-prep]
    if: needs.detect-android-changes.outputs.run_release == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 90
    environment: release
    env:
      SCCACHE_BUCKET: rust-cache
      SCCACHE_ENDPOINT: ${{ secrets.SCCACHE_R2_ENDPOINT }}
      SCCACHE_REGION: auto
      SCCACHE_S3_USE_SSL: "true"
      SCCACHE_S3_KEY_PREFIX: ci/android
      SCCACHE_LOG: info
      AWS_ACCESS_KEY_ID: ${{ secrets.SCCACHE_R2_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.SCCACHE_R2_SECRET_ACCESS_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android platforms and NDK
        run: |
          yes | sdkmanager --licenses
          sdkmanager "platform-tools" "platforms;android-35" "build-tools;35.0.0" "ndk;30.0.14904198"

      - name: Install system deps
        run: sudo apt-get update && sudo apt-get install -y pkg-config libssl-dev libcap-dev clang cmake

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,x86_64-linux-android

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Prime sccache
        run: |
          export SCCACHE_ERROR_LOG="$RUNNER_TEMP/sccache-android.log"
          rm -f "$SCCACHE_ERROR_LOG"
          sccache --stop-server || true
          sccache --start-server
          sccache --show-stats || true

      - name: Download shared prep artifact
        uses: actions/download-artifact@v4
        with:
          name: shared-prep
          path: .ci-prep/shared

      - name: Restore shared prep
        run: |
          ./apps/ios/scripts/sync-codex.sh --preserve-current

          SHARED_PREP_ROOT=.ci-prep/shared
          if [ -d "$SHARED_PREP_ROOT/shared" ]; then
            SHARED_PREP_ROOT="$SHARED_PREP_ROOT/shared"
          fi

          tar -xzf "$SHARED_PREP_ROOT/generated-mobile-sources.tgz" -C .
          mkdir -p .build-stamps
          touch .build-stamps/sync .build-stamps/bindings-kotlin

      - name: Install cargo-ndk
        env:
          RUSTC_WRAPPER: sccache
        run: cargo install cargo-ndk --locked

      - name: Build Rust JNI libs
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/30.0.14904198
          RUSTC_WRAPPER: sccache
        run: make rust-android

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Decode upload keystore
        env:
          ANDROID_UPLOAD_KEYSTORE_B64: ${{ secrets.ANDROID_UPLOAD_KEYSTORE_B64 }}
        run: |
          if [ -z "${ANDROID_UPLOAD_KEYSTORE_B64:-}" ]; then
            echo "Missing secret ANDROID_UPLOAD_KEYSTORE_B64"
            exit 1
          fi
          store_file="$RUNNER_TEMP/litter-upload.jks"
          echo "$ANDROID_UPLOAD_KEYSTORE_B64" | base64 --decode > "$store_file"
          echo "LITTER_UPLOAD_STORE_FILE=$store_file" >> "$GITHUB_ENV"
          ls -lh "$store_file"

      - name: Build signed release APK
        env:
          LITTER_UPLOAD_STORE_FILE: ${{ env.LITTER_UPLOAD_STORE_FILE }}
          LITTER_UPLOAD_STORE_PASSWORD: ${{ secrets.LITTER_UPLOAD_STORE_PASSWORD }}
          LITTER_UPLOAD_KEY_ALIAS: ${{ secrets.LITTER_UPLOAD_KEY_ALIAS }}
          LITTER_UPLOAD_KEY_PASSWORD: ${{ secrets.LITTER_UPLOAD_KEY_PASSWORD }}
        run: apps/android/gradlew -p apps/android :app:assembleRelease

      - name: Generate checksums
        run: |
          APK_PATH="apps/android/app/build/outputs/apk/release/app-release.apk"
          sha256sum "$APK_PATH" > "${APK_PATH}.sha256"

      - name: Upload build artifact (manual runs)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: |
            apps/android/app/build/outputs/apk/release/app-release.apk
            apps/android/app/build/outputs/apk/release/app-release.apk.sha256

      - name: Publish GitHub Release (tag runs)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            apps/android/app/build/outputs/apk/release/app-release.apk
            apps/android/app/build/outputs/apk/release/app-release.apk.sha256
          generate_release_notes: true
          fail_on_unmatched_files: true
